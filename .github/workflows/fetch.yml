name: Fetch MLB And ESPN Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run Extractor
        run: python src/fetch_mlb_espn.py

      - name: Upload Data
        uses: actions/upload-artifact@v4
        with:
          name: mlb-espn-data
          path: data/processed/
