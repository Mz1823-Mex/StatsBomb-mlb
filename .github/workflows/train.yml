name: Train ML Model

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "data/**"
      - "requirements.txt"
      - ".github/workflows/train.yml"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Training
        run: |
          python src/train.py

      - name: Upload Metrics And Model
        uses: actions/upload-artifact@v4
        with:
          name: ml-training-artifacts
          path: outputs/
