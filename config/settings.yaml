# MLB Data Pipeline - Configuration Settings
# Central configuration for data extraction, processing, and model training

# ============================================================================
# DATA SOURCES CONFIGURATION
# ============================================================================
data:
  # Raw data directory - where to store unprocessed data
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  validation_dir: "data/validation"
  
  # File formats
  formats:
    raw: "csv"
    processed: "parquet"
    
  # Data validation thresholds
  validation:
    min_rows: 100
    required_columns:
      - player_id
      - player_name
      - season
      - date
      - team_id
      - team_name
    max_missing_percent: 30  # Allow up to 30% missing values
    duplicate_handling: "drop"  # drop, keep_first, raise_error

# ============================================================================
# FEATURE ENGINEERING CONFIGURATION
# ============================================================================
features:
  # Sabermetric features to compute
  batting:
    basic:
      - AVG           # Batting Average: hits / at_bats
      - OBP           # On-Base Percentage
      - SLG           # Slugging Percentage
      - OPS           # On-base Plus Slugging
      - wOBA          # Weighted On-Base Average
    advanced:
      - ISO           # Isolated Power
      - BABIP         # Batting Average on Balls In Play
      - contact_rate  # Contact Rate %
      - strikeout_rate  # K Rate %
  
  pitching:
    basic:
      - ERA           # Earned Run Average
      - WHIP          # Walks + Hits per IP
      - K9            # Strikeouts per 9 IP
      - BB9           # Walks per 9 IP
    advanced:
      - FIP           # Fielding Independent Pitching
      - SIERA_approx  # Simplified ERA
      - LOB_percent   # Left On Base %
  
  # Temporal features (rolling windows)
  rolling_windows:
    - 7    # 7-game rolling average
    - 15   # 15-game rolling average
    - 30   # 30-game rolling average
  
  # Lag features (previous N games)
  lag_periods: [1, 3, 7]
  
  # Aggregation levels
  aggregations:
    - player
    - team
    - position

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
model:
  # Train/validation/test split
  train_ratio: 0.60
  val_ratio: 0.20
  test_ratio: 0.20
  
  # Time-based split (for temporal data)
  time_split: true
  test_start_date: "2025-01-01"
  
  # Random seed for reproducibility
  random_state: 42
  
  # Feature selection
  feature_selection:
    method: "mutual_info"  # mutual_info, variance_threshold, rfe
    n_features: null  # null = keep all, or specify number
    variance_threshold: 0.01
  
  # Preprocessing
  preprocessing:
    standardize: true
    handle_missing: "mean"  # mean, median, forward_fill
    remove_outliers: false
    outlier_method: "iqr"  # iqr, zscore
    outlier_threshold: 3.0

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "json"  # json, standard
  log_dir: "logs"
  max_bytes: 10485760  # 10MB
  backup_count: 5
  console_output: true

# ============================================================================
# API CONFIGURATION
# ============================================================================
api:
  mlb_stats_base_url: "https://statsapi.mlb.com/api/v1"
  timeout: 30
  max_retries: 3
  retry_delay: 2  # seconds
  
  # Batch processing
  batch_size: 100
  rate_limit: 10  # requests per second

# ============================================================================
# EXECUTION CONFIGURATION
# ============================================================================
execution:
  # Number of parallel workers
  n_workers: 4
  
  # Seasons to process (2026 MLB season)
  seasons: [2026]
  
  # Verbose output
  verbose: true
  
  # Save intermediate artifacts
  save_artifacts: true
  artifacts_dir: "outputs"

# ============================================================================
# QUALITY ASSURANCE
# ============================================================================
qa:
  # Data quality checks
  enable_data_validation: true
  enable_null_checks: true
  enable_duplicate_checks: true
  
  # Model evaluation
  save_metrics: true
  metrics_dir: "outputs/metrics"
  
  # Artifacts versioning
  version_artifacts: true
